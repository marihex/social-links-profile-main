<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link
            rel="preload"
            href="./assets/fonts/static/inter-v20-latin-regular.woff2"
            as="font"
            type="font/woff2"
            crossorigin
    />
    <link
            rel="preload"
            href="./assets/fonts/static/inter-v20-latin-500.woff2"
            as="font"
            type="font/woff2"
            crossorigin
    />
    <link
            rel="preload"
            href="./assets/fonts/static/inter-v20-latin-600.woff2"
            as="font"
            type="font/woff2"
            crossorigin
    />
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/style.css">
    <title>Frontend Mentor | Social links profile</title>

</head>
<body>
<main class="container">
    <section class="card">
            <img class="card__avatar" src="assets/images/avatar-jessica.jpeg" alt="" height="176" width="176" fetchpriority="high">
            <div class="card__person">
                <h1 class="card__title">Jessica Randall</h1>
                <span class="card__location">London, United Kingdom</span>
            </div>
            <p class="card__description">"Front-end developer and avid reader."</p>
        <ul class="card__links">
            <li class="card__link">
                <a href="https://github.com/" class="card__github">GitHub</a>
            </li>
            <li class="card__link">
                <a href="https://www.frontendmentor.io/" class="card__frontendmentor">Frontend Mentor</a>
            </li>
            <li class="card__link">
                <a href="https://www.linkedin.com/" class="card__linkedin">LinkedIn</a>
            </li>
            <li class="card__link">
                <a href="https://x.com/" class="card__twitter">Twitter</a></li>
            <li class="card__link">
                <a href="https://www.instagram.com/" class="card__instagram">Instagram</a>
            </li>
        </ul>
    </section>
</main>

</body>
</html>
